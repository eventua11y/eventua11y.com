name: Accessibility Scanner

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 10:00 UTC
    - cron: '0 10 * * 1'

permissions:
  contents: read
  issues: write

jobs:
  scan:
    name: Scan production pages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: github/accessibility-scanner@v3
        with:
          urls: |
            https://eventua11y.com/
            https://eventua11y.com/past-events
            https://eventua11y.com/accessibility
            https://eventua11y.com/curation-policy
          repository: ${{ github.repository }}
          token: ${{ secrets.A11Y_SCANNER_TOKEN }}
          cache_key: .github/accessibility-scanner/eventua11y.com-main.json
          open_grouped_issues: true
          group_by: rule+url

      - name: Add accessibility label to scanner issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f scanner-results.json ]; then
            echo "No scanner results file found; skipping labeling."
            exit 0
          fi

          jq -r '.[] | select(.issue and .issue.number) | .issue.number' scanner-results.json \
            | sort -u \
            | while read -r issue_number; do
                if [ -n "$issue_number" ]; then
                  gh issue edit "$issue_number" \
                    --repo "${{ github.repository }}" \
                    --add-label "accessibility"
                fi
              done

      - name: Debug scanner-results.json shape
        if: always()
        run: |
          if [ -f scanner-results.json ]; then
            jq '.[0:2]' scanner-results.json
          else
            echo "no scanner-results.json"
          fi

      - name: Report scan to Ablebase
        if: always()
        env:
          ABLEBASE_INGEST_KEY: ${{ secrets.ABLEBASE_INGEST_KEY }}
        run: |
          if [ -f scanner-results.json ]; then
            # Field names (rule/id, impact, url) follow axe-core violation
            # convention; scanner's own output schema isn't publicly documented.
            findings=$(jq '[.[] | {
              title: (.rule // .id // .description // "Accessibility issue"),
              severity: (.impact // .severity // "unknown"),
              sourceUrl: (.url // .pageUrl // .sourceUrl // "")
            }]' scanner-results.json)
          else
            findings='[]'
          fi

          payload=$(jq -n \
            --arg productRef "eventua11ycom" \
            --arg idempotencyKey "${{ github.run_id }}-${{ github.run_attempt }}" \
            --argjson findings "$findings" \
            '{productRef: $productRef, type: "automated_scan", tool: "github-accessibility-scanner", idempotencyKey: $idempotencyKey, findings: $findings}')

          http_code=$(curl -s -o response.txt -w "%{http_code}" -X POST https://api.ablebase.org/ingest/test-activity \
            -H "Authorization: Bearer $ABLEBASE_INGEST_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload")

          cat response.txt
          if [ "$http_code" -ge 400 ]; then
            echo "Ablebase ingest failed with HTTP $http_code"
            exit 1
          fi
