name: Accessibility Scanner

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 10:00 UTC
    - cron: '0 10 * * 1'

permissions:
  contents: read
  issues: write

jobs:
  scan:
    name: Scan production pages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: github/accessibility-scanner@v3
        with:
          urls: |
            https://eventua11y.com/
            https://eventua11y.com/past-events
            https://eventua11y.com/accessibility
            https://eventua11y.com/curation-policy
          repository: ${{ github.repository }}
          token: ${{ secrets.A11Y_SCANNER_TOKEN }}
          cache_key: .github/accessibility-scanner/eventua11y.com-main.json
          open_grouped_issues: true
          group_by: rule+url

      - name: Add accessibility label to scanner issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f scanner-results.json ]; then
            echo "No scanner results file found; skipping labeling."
            exit 0
          fi

          jq -r '.[] | select(.issue and .issue.number) | .issue.number' scanner-results.json \
            | sort -u \
            | while read -r issue_number; do
                if [ -n "$issue_number" ]; then
                  gh issue edit "$issue_number" \
                    --repo "${{ github.repository }}" \
                    --add-label "accessibility"
                fi
              done
