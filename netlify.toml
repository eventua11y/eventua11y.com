[dev]
  port = 8888
  targetPort = 4321

# Edge functions are auto-discovered from netlify/edge-functions/
# Each function exports its own config with the path, so no explicit
# [[edge_functions]] entries are needed here.

# Global security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.usefathom.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://cdn.sanity.io https://avatars.githubusercontent.com https://media.licdn.com data:; connect-src 'self' https://*.supabase.co https://*.sentry.io https://*.ingest.sentry.io https://cdn.usefathom.com; form-action 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"

# Immutable caching for hashed Astro assets (JS, CSS)
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long cache for favicon assets
[[headers]]
  for = "/favicon/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Redirect /events to the homepage at the CDN edge,
# avoiding a serverless function invocation.
[[redirects]]
  from = "/events"
  to = "/"
  status = 301